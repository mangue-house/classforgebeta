name: Deploy Class Forge

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Configura as permissões necessárias para o deploy oficial do GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure API Key
      run: |
        sed -i "s|__GEMINI_API_KEY__|${{ secrets.GEMINI_API_KEY }}|g" config.js

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
